_format_version: "3.0"
_transform: true



services:
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false
        plugins:

          - name: rate-limiting
            config:
              minute: 10
              policy: local
              fault_tolerant: true

      - name: auth-docs-route
        paths:
          - /auth-docs
        strip_path: true
        plugins:
          - name: request-transformer
            config:
              add:
                headers:
                  - "X-Forwarded-Prefix:/auth-docs"

  - name: forensic-api
    url: http://forensic-api:8000
    routes:
      - name: forensic-routes
        paths:
          - /api/forensic
        strip_path: false

      - name: forensic-docs-route
        paths:
          - /forensic-docs
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "http://localhost:5174"
        - "http://32.198.156.63"
        - "http://deepforense.me"
        - "https://deepforense.me"
        - "/^https?:\\/\\/.*$/"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
