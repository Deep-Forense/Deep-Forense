version: "3.9"

# DeepForense — Docker Compose base (entorno de desarrollo local)
# Levanta toda la infraestructura + los 4 microservicios del MVP.

services:

  # ------------------------------------------------------------------
  # Infraestructura
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: deepforense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deepforense_auth}
      POSTGRES_USER: ${POSTGRES_USER:-deepforense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepforense} -d ${POSTGRES_DB:-deepforense_auth}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: deepforense-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-deepforense}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-deepforense_forensic}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: deepforense-redis
    restart: unless-stopped
    # Persistencia: AOF (append-only file, se re-sincroniza cada segundo) +
    # snapshots RDB de respaldo. Sin esto, cualquier tarea encolada que
    # forensic-worker no haya consumido aún se pierde si el contenedor se reinicia.
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: deepforense-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-deepforense}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Consola web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # T0.2 (historia FOR-125): crea el bucket deepforense-artifacts al iniciar.
  # Contenedor one-shot: corre, crea el bucket si no existe, y termina.
  # ------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: deepforense-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-deepforense}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-deepforense-artifacts}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      (mc mb local/$$MINIO_BUCKET || true) &&
      echo 'Bucket listo: '$$MINIO_BUCKET
      "

  # ------------------------------------------------------------------
  # Kong API Gateway (modo DB-less, config declarativa en kong/kong.yml)
  # ------------------------------------------------------------------
  kong:
    image: kong:3.7
    container_name: deepforense-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"   # Proxy (entrada única del frontend)
      - "8001:8001"   # Admin API (solo desarrollo)
    depends_on:
      - auth-service
      - forensic-api

  # ------------------------------------------------------------------
  # Microservicios de negocio
  # ------------------------------------------------------------------
  auth-service:
    build:
      context: ./auth-service
    container_name: deepforense-auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-deepforense_auth}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-deepforense}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  forensic-api:
    build:
      context: ./forensic-api
    container_name: deepforense-forensic-api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-deepforense}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/${MONGO_DB:-deepforense_forensic}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-deepforense}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-deepforense-artifacts}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      SCRAPFLY_API_KEY: ${SCRAPFLY_API_KEY:-}
      MAX_IMAGES_PER_JOB: ${MAX_IMAGES_PER_JOB:-5}
      ROOT_PATH: /forensic-docs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "8000"

  forensic-worker:
    build:
      context: ./forensic-worker
    container_name: deepforense-forensic-worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-deepforense}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/${MONGO_DB:-deepforense_forensic}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-deepforense}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-deepforense-artifacts}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_OCR_DEEPINFRA_API_KEY: ${DEEPSEEK_OCR_DEEPINFRA_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BENFORD_MIN_AMOUNT_COUNT: ${BENFORD_MIN_AMOUNT_COUNT:-15}
      CONSOLIDATION_POLICY: ${CONSOLIDATION_POLICY:-worst_case_dominates}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Swagger UI unificado: sirve docs/openapi.yaml (contrato completo,
  # auth-service + forensic-api) sin depender de cada framework.
  # ------------------------------------------------------------------
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: deepforense-swagger-ui
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/openapi.yaml:ro
    ports:
      - "8085:8080"

  # ------------------------------------------------------------------
  # Frontend
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: deepforense-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - kong

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  redis_data:
