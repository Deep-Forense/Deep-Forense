services:
  postgres:
    ports:
      - "5432:5432"

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  kong:
    ports:
      - "8001:8001"

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: deepforense-swagger-ui
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/openapi.yaml:ro
    ports:
      - "8085:8080"
