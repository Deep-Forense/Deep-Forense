name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  auth-service:
    name: auth-service (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Compile y test
        working-directory: auth-service
        run: mvn -B verify

  forensic-api:
    name: forensic-api (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: forensic-api/requirements-dev.txt
      - name: Instalar dependencias
        working-directory: forensic-api
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        working-directory: forensic-api
        run: pip install ruff && ruff check app
      - name: Compilar (chequeo de sintaxis)
        working-directory: forensic-api
        run: python -m compileall -q app
      - name: Tests (pytest)
        working-directory: forensic-api
        run: python -m pytest -q

  forensic-worker:
    name: forensic-worker (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: forensic-worker/requirements-dev.txt
      - name: Instalar dependencias
        working-directory: forensic-worker
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        working-directory: forensic-worker
        run: pip install ruff && ruff check app
      - name: Compilar (chequeo de sintaxis)
        working-directory: forensic-worker
        run: python -m compileall -q app
      - name: Tests (pytest)
        working-directory: forensic-worker
        run: python -m pytest -q

  frontend:
    name: frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build (dev y prod)
    runs-on: ubuntu-latest
    needs: [auth-service, forensic-api, forensic-worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build targets de desarrollo (base + override)
        run: docker compose build
      - name: Build targets de producción (base + prod)
        env:
          VITE_API_BASE_URL: https://ci-placeholder.invalid
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build
