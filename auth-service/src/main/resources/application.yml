server:
  port: 8080

  forward-headers-strategy: framework

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/deepforense_auth}
    username: ${SPRING_DATASOURCE_USERNAME:deepforense}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

deepforense:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
